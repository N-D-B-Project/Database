services:
  ndbase:
    image: bitnamilegacy/postgresql:17.6.0-debian-12-r4
    container_name: ndbase
    restart: always
    ports:
      - "${DATABASE_PORT}:5432"
    volumes:
      - ndbase_data:/bitnami/postgresql
    environment:
      - POSTGRESQL_USERNAME=${DATABASE_USERNAME}
      - POSTGRESQL_PASSWORD=${DATABASE_PASSWORD}
      - POSTGRESQL_PORT_NUMBER=5432
      - POSTGRESQL_DATABASE=${DATABASE_NAME}
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME}" ]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - ndnetwork
  ndredis:
    image: bitnamilegacy/redis:8.2.1-debian-12-r0
    container_name: ndredis
    restart: always
    volumes:
      - ndredis_data:/bitnami/redis
    environment:
      - ALLOW_EMPTY_PASSWORD=no
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_ENABLE_APPENDONLY=yes
    ports:
      - "${REDIS_PORT}:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping" ]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - ndnetwork

volumes:
  ndbase_data:
  ndredis_data:


networks:
  ndnetwork:
    driver: bridge
